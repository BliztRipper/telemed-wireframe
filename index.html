<div class="app">

  <header role="banner">
    <button id="hamburger" class="icon-btn ghost" aria-label="Open menu">
      <svg class="icon icon-lg" aria-hidden="true"><use href="#i-menu"/></svg>
    </button>

    <a class="brand" href="#" aria-label="Telemed Clinical Console">
      <span class="brand-mark"><svg class="icon" aria-hidden="true"><use href="#i-stethoscope"/></svg></span>
      <span class="brand-name">
        Telemed
        <small>Clinical Console</small>
      </span>
    </a>

    <span id="flag-count" class="flag-count-chip" style="display:none" role="status" aria-live="polite"></span>

    <div class="spacer"></div>

    <button class="search-trigger" aria-label="Search patients">
      <svg class="icon" aria-hidden="true"><use href="#i-search"/></svg>
      <span>Search patients…</span>
      <kbd>⌘K</kbd>
    </button>

    <span class="identity-chip" id="identity-chip" aria-readonly="true">
      <span class="identity-avatar" aria-hidden="true">DR</span>
      <span>
        <span class="identity-name">Dr. Somchai N.</span>
        <span class="identity-id">ID D-00123</span>
      </span>
    </span>

    <label class="role-switch">
      <span class="sr-only">Role</span>
      <svg class="icon" aria-hidden="true" style="color:var(--text-subtle)"><use href="#i-user"/></svg>
      <select id="role-toggle" aria-label="Switch role">
        <option value="doctor">Doctor</option>
        <option value="nurse">Nurse</option>
      </select>
    </label>
  </header>

  <aside id="sidebar" aria-label="Primary navigation">
    <div class="sidebar-section-label">Workflow</div>
    <a class="nav-item" data-screen="queue" tabindex="0" role="link">
      <span class="nav-step">1</span>
      <svg class="icon" aria-hidden="true"><use href="#i-clipboard"/></svg>
      <span>Patient Queue</span>
    </a>
    <a class="nav-item" data-screen="summary" tabindex="0" role="link">
      <span class="nav-step">2</span>
      <svg class="icon" aria-hidden="true"><use href="#i-heart-pulse"/></svg>
      <span>Patient Summary</span>
    </a>
    <a class="nav-item" data-screen="video" tabindex="0" role="link">
      <span class="nav-step">3</span>
      <svg class="icon" aria-hidden="true"><use href="#i-video"/></svg>
      <span>Video Consult</span>
    </a>
    <a class="nav-item" data-screen="assessment" tabindex="0" role="link">
      <span class="nav-step">4</span>
      <svg class="icon" aria-hidden="true"><use href="#i-file-edit"/></svg>
      <span>Assess &amp; Plan</span>
    </a>
    <a class="nav-item" data-screen="sync" tabindex="0" role="link">
      <span class="nav-step">5</span>
      <svg class="icon" aria-hidden="true"><use href="#i-refresh"/></svg>
      <span>Record &amp; Sync</span>
    </a>

    <div class="scenario-picker">
      <label for="scenario-toggle">Demo scenario</label>
      <select id="scenario-toggle">
        <option value="A">A · Stable (Somchai)</option>
        <option value="B">B · Red-flag (Malee)</option>
        <option value="C">C · Sync fail (Anan)</option>
      </select>
      <span class="hint">Switch demo patient to test workflows.</span>
    </div>
  </aside>

  <main id="main" role="main"></main>
</div>

<script type="module" src="js/nav.js"></script>
</body>
</html>

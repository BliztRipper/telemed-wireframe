<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Doctor self-view: clinician in white coat with stethoscope">
  <defs>
    <linearGradient id="dBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B3A4B"/>
      <stop offset="1" stop-color="#0F2230"/>
    </linearGradient>
    <linearGradient id="dSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8B98A"/>
      <stop offset="1" stop-color="#C99367"/>
    </linearGradient>
    <linearGradient id="dCoat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="dGlow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Office background -->
  <rect width="320" height="200" fill="url(#dBg)"/>
  <rect width="320" height="200" fill="url(#dGlow)"/>
  <!-- Soft shelf hint -->
  <rect x="0" y="120" width="320" height="3" fill="#22D3EE" opacity="0.18"/>

  <!-- Coat shoulders -->
  <path d="M40 200 C 60 150, 110 130, 160 130 C 210 130, 260 150, 280 200 Z" fill="url(#dCoat)"/>
  <!-- Coat lapels -->
  <path d="M125 145 L160 175 L195 145 L195 160 L160 195 L125 160 Z" fill="#CBD5E1"/>
  <!-- Inner shirt collar -->
  <path d="M148 150 L160 168 L172 150 Z" fill="#0E7490"/>
  <!-- Stethoscope (cyan tubing) -->
  <path d="M120 138 Q 110 165, 130 175" stroke="#0891B2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M200 138 Q 210 165, 190 175" stroke="#0891B2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M130 175 Q 160 195, 190 175" stroke="#0891B2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="160" cy="195" r="6" fill="#155E75" stroke="#0891B2" stroke-width="1.5"/>
  <!-- Earpieces -->
  <circle cx="120" cy="138" r="3" fill="#155E75"/>
  <circle cx="200" cy="138" r="3" fill="#155E75"/>
  <!-- ID badge -->
  <rect x="200" y="160" width="22" height="14" rx="2" fill="#0891B2"/>
  <rect x="203" y="163" width="16" height="2" fill="#FFFFFF" opacity="0.7"/>
  <rect x="203" y="167" width="10" height="1.5" fill="#FFFFFF" opacity="0.5"/>
  <line x1="211" y1="155" x2="211" y2="160" stroke="#94A3B8" stroke-width="1"/>

  <!-- Neck -->
  <path d="M148 110 Q160 130, 172 110 L172 145 Q160 155, 148 145 Z" fill="url(#dSkin)"/>
  <!-- Head -->
  <ellipse cx="160" cy="78" rx="38" ry="44" fill="url(#dSkin)"/>
  <!-- Ears -->
  <ellipse cx="123" cy="80" rx="6" ry="9" fill="#B6814F"/>
  <ellipse cx="197" cy="80" rx="6" ry="9" fill="#B6814F"/>
  <!-- Hair: short professional -->
  <path d="M122 60 Q 130 32, 160 30 Q 190 32, 198 60 Q 188 48, 160 47 Q 132 48, 122 60 Z" fill="#2B2B2B"/>
  <!-- Eyebrows -->
  <path d="M138 70 Q145 67, 152 70" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M168 70 Q175 67, 182 70" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Eyes -->
  <ellipse cx="145" cy="80" rx="2.6" ry="1.8" fill="#1A1A1A"/>
  <ellipse cx="175" cy="80" rx="2.6" ry="1.8" fill="#1A1A1A"/>
  <circle cx="145.6" cy="79.4" r="0.7" fill="#FFFFFF"/>
  <circle cx="175.6" cy="79.4" r="0.7" fill="#FFFFFF"/>
  <!-- Nose -->
  <path d="M159 86 Q 156 100, 160 105 Q 164 100, 161 86" stroke="#9C6840" stroke-width="1" fill="none"/>
  <!-- Mouth: confident smile -->
  <path d="M150 113 Q 160 119, 170 113" stroke="#7A3F2A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Cheek warmth -->
  <ellipse cx="138" cy="95" rx="6" ry="3" fill="#E68A6F" opacity="0.22"/>
  <ellipse cx="182" cy="95" rx="6" ry="3" fill="#E68A6F" opacity="0.22"/>
</svg>

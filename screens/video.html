<section class="screen">
  <div class="page-header">
    <div>
      <h1 id="vid-identity"></h1>
      <div class="meta">Video consultation in progress</div>
    </div>
    <div class="actions">
      <button id="btn-end-call" class="danger">
        <svg class="icon" aria-hidden="true"><use href="#i-phone-off"/></svg>
        End Call
      </button>
      <button id="btn-save-cont" class="primary">
        <svg class="icon" aria-hidden="true"><use href="#i-arrow-right"/></svg>
        Save &amp; Continue
      </button>
    </div>
  </div>

  <div class="split-50">
    <div class="video-stage">
      <img id="vid-patient-img" src="assets/patient-A.svg" alt="Patient video feed" />
      <div class="self" id="vid-self-view">
        <img id="vid-self-img" src="assets/doctor.svg" alt="Self view: Doctor" />
        <span class="self-label" id="vid-self-label">Dr · self-view</span>
      </div>
      <div class="live">LIVE</div>
    </div>

    <div class="video-side">
      <div class="card danger" id="vid-redband" style="display:none">
        <h3><svg class="icon" aria-hidden="true"><use href="#i-alert-octagon"/></svg> Red Flag Acknowledged</h3>
        <div id="vid-flags" class="row wrap" style="gap:6px"></div>
      </div>

      <div class="card">
        <h3><svg class="icon" aria-hidden="true"><use href="#i-heart-pulse"/></svg> Vitals</h3>
        <div id="vid-vitals" class="row wrap" style="gap:6px"></div>
      </div>

      <div class="card">
        <h3><svg class="icon" aria-hidden="true"><use href="#i-flask"/></svg> Abnormal Labs</h3>
        <div id="vid-labs" class="row wrap" style="gap:6px"></div>
      </div>

      <div class="card">
        <h3><svg class="icon" aria-hidden="true"><use href="#i-pill"/></svg> Meds &amp; Allergy</h3>
        <div id="vid-meds"></div>
      </div>

      <div class="card">
        <h3><svg class="icon" aria-hidden="true"><use href="#i-mic"/></svg> Voice Transcript <span class="chip info" style="margin-left:6px">Live AI</span></h3>
        <div class="transcript" id="vid-transcript"></div>
        <div class="row" style="margin-top:4px">
          <button class="sm"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-mic"/></svg> REC</button>
          <button class="sm">Pause</button>
          <button class="sm">Edit</button>
        </div>
      </div>

      <div class="card note-card">
        <div class="note-header">
          <h3><svg class="icon" aria-hidden="true"><use href="#i-edit"/></svg> Consult Note</h3>
          <span class="note-timestamp" id="note-ts">No note yet</span>
        </div>
        <textarea id="note-text" placeholder="Type consult note here… (autosaves)"></textarea>
        <div class="note-actions">
          <button id="btn-save-note" class="primary">
            <svg class="icon" aria-hidden="true"><use href="#i-save"/></svg>
            Save draft
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

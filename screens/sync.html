<section class="screen">
  <div class="page-header">
    <div>
      <h1>Record &amp; Sync</h1>
      <div class="meta">Patient: <span id="sync-name"></span></div>
    </div>
    <span id="sync-count-pill" class="count-pill">0 / 0 synced</span>
  </div>

  <div id="sync-bigbar" class="status-bar syncing">
    <svg class="icon" aria-hidden="true"><use href="#i-refresh"/></svg>
    <span>Syncing…</span>
  </div>

  <div class="muted" id="sync-ts" style="font-size:var(--fs-sm)"></div>

  <div id="sync-list"></div>

  <div class="row space" style="margin-top:8px">
    <button id="btn-retry-all" style="display:none">
      <svg class="icon" aria-hidden="true"><use href="#i-refresh"/></svg>
      Retry All Failed
    </button>
    <button id="btn-back" class="primary">
      <svg class="icon" aria-hidden="true"><use href="#i-arrow-right"/></svg>
      Back to Queue
    </button>
  </div>

  <details class="card">
    <summary>Full Audit Trail (optional)</summary>
    <pre style="white-space:pre-wrap; font-family:var(--font-mono); font-size:var(--fs-xs); color:var(--text-muted)">mock audit entries…</pre>
  </details>
</section>
